# Conflux Atlas — pytest config
[pytest]
testpaths = tests
pythonpath = .
markers =
    network: hits live download/API URLs (opt-in; not part of default Phase 0 gate)
    phase1: movement/retrieval/scorecard contracts — skip until conflux.movement + conflux.scorecard exist
    phase2: settlement/trust contracts — skip until conflux.learning + conflux.settlement exist
    phase3: banded-forecast/backtest/bridge contracts — skip until conflux.forecast + conflux.backtest + conflux.bridge exist
filterwarnings =
    ignore::DeprecationWarning
